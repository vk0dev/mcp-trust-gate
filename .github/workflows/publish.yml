name: Publish to npm

on:
  push:
    tags: ["v*"]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - name: Use Node.js 20
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Unit tests
        run: npm test

      - name: MCP client smoke test
        run: npm run smoke

      - name: Publish to npm with provenance
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          body: |
            Published to npm: https://www.npmjs.com/package/@vk0/${{ github.event.repository.name }}

            Install via `npx`:
            ```bash
            npx -y @vk0/${{ github.event.repository.name }}
            ```

            See [CHANGELOG.md](./CHANGELOG.md) for details.

      - name: Install mcp-publisher
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz mcp-publisher
        continue-on-error: true

      - name: Authenticate to MCP Registry
        run: ./mcp-publisher login github-oidc
        continue-on-error: true

      - name: Publish to Official MCP Registry
        run: |
          ./mcp-publisher publish || \
          echo "::warning::MCP Registry publish failed — may need manual 'mcp-publisher publish'"
        continue-on-error: true

      - name: Publish to Smithery
        run: |
          npx -y @smithery/cli@latest mcp publish --name "${{ vars.SMITHERY_SERVER_NAME || 'unfucker/${{ github.event.repository.name }}' }}" || \
          echo "::warning::Smithery publish failed — may need manual publish"
        env:
          SMITHERY_API_KEY: ${{ secrets.SMITHERY_API_KEY }}
        continue-on-error: true

      - name: Deploy to MCPize
        run: |
          npx -y mcpize deploy -y 2>/dev/null || \
          echo "::warning::MCPize deploy failed — run 'npx mcpize deploy' manually"
        env:
          MCPIZE_TOKEN: ${{ secrets.MCPIZE_TOKEN }}
        continue-on-error: true
