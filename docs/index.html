<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>mcp-trust-gate</title>
  <style>
    :root { --bg: #0d1117; --fg: #c9d1d9; --accent: #58a6ff; --surface: #161b22; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--fg); line-height: 1.6; }
    .container { max-width: 720px; margin: 0 auto; padding: 4rem 2rem; }
    h1 { color: var(--accent); font-size: 2rem; margin-bottom: 0.5rem; }
    .tagline { font-size: 1.2rem; opacity: 0.8; margin-bottom: 2rem; }
    .install { background: var(--surface); padding: 1rem 1.5rem; border-radius: 8px; font-family: monospace; margin: 2rem 0; }
    .links { margin-top: 2rem; }
    .links a { color: var(--accent); text-decoration: none; margin-right: 1.5rem; }
    .links a:hover { text-decoration: underline; }
    footer { margin-top: 4rem; opacity: 0.5; font-size: 0.85rem; }
  </style>
</head>
<body>
  <div class="container">
    <h1>mcp-trust-gate</h1>
    <p class="tagline">Pre-install trust gate for MCP servers — GO/REVIEW/BLOCK verdict with evidence</p>
    <div class="install">npx -y @vk0/mcp-trust-gate</div>
    <div class="links">
      <a href="https://www.npmjs.com/package/@vk0/mcp-trust-gate">npm</a>
      <a href="https://github.com/vk0dev/mcp-trust-gate">GitHub</a>
      <a href="https://github.com/vk0dev/mcp-trust-gate/blob/main/CHANGELOG.md">Changelog</a>
    </div>
    <footer>MIT License &middot; vk0.dev</footer>
  </div>
</body>
</html>
